name: Smoke Suite

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Set git user name and email
        run: |
          git config --global user.name "Mark Cooper"
          git config --global user.email "markcooper235@github.com"
      - name: Run install-repo smoke suite
        run: bash scripts/smoke/e2e-sanity.sh --ci
      - name: Run upgrade smoke suite
        run: bash scripts/smoke/e2e-upgrade.sh
